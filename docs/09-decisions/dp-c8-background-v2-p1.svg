<svg xmlns="http://www.w3.org/2000/svg" width="3200" height="1800" viewBox="0 0 1600 900" font-family="Pretendard, 'Noto Sans KR', 'Malgun Gothic', sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#64748B"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1600" height="900" fill="#FFFFFF"/>

  <!-- ===== 헤더 ===== -->
  <rect x="40" y="24" width="88" height="38" rx="8" fill="#0F172A"/>
  <text x="84" y="49" text-anchor="middle" font-size="17" font-weight="700" fill="#FFFFFF">DP-C8</text>
  <text x="144" y="45" font-size="26" font-weight="700" fill="#0F172A">에이전트 루프 구조 <tspan font-size="15" font-weight="400" fill="#64748B">— 배경 (1/2) · 루프 구조와 설계 변수</tspan></text>
  <text x="144" y="70" font-size="14.5" fill="#475569">계획의 소유 구조와 컨텍스트 수명 = 다단계 웹 태스크 성공률의 결정 변수</text>
  <text x="1560" y="40" text-anchor="end" font-size="11.5" fill="#64748B">선행 결정: BD-1 자율 서브에이전트 · DP-C2 Quick Action 분리</text>
  <text x="1560" y="60" text-anchor="end" font-size="11.5" fill="#64748B">QAS 1순위: E2E 태스크 성공률</text>
  <line x1="40" y1="86" x2="1560" y2="86" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- ===== 01 에이전트 루프 ===== -->
  <rect x="40" y="100" width="1520" height="360" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="56" y="114" width="27" height="27" rx="6" fill="#0F172A"/>
  <text x="69.5" y="133" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">01</text>
  <text x="92" y="133" font-size="16.5" font-weight="700" fill="#0F172A">에이전트 루프 <tspan font-size="12.5" font-weight="400" fill="#64748B">— 관찰 · 추론 · 행동의 반복 구조</tspan></text>

  <!-- 컨텍스트 -->
  <rect x="150" y="175" width="520" height="86" rx="8" fill="#FFFFFF" stroke="#0F172A" stroke-width="2"/>
  <text x="162" y="196" font-size="12.5" font-weight="700" fill="#0F172A">컨텍스트 — 루프의 유일한 상태</text>
  <rect x="162" y="212" width="52" height="26" rx="4" fill="#FEF3C7" stroke="#F59E0B"/>
  <text x="188" y="229" text-anchor="middle" font-size="10" font-weight="700" fill="#92400E">목표</text>
  <rect x="220" y="212" width="52" height="26" rx="4" fill="#FEF3C7" stroke="#F59E0B"/>
  <text x="246" y="229" text-anchor="middle" font-size="10" font-weight="700" fill="#92400E">계획</text>
  <rect x="278" y="212" width="76" height="26" rx="4" fill="#F1F5F9" stroke="#CBD5E1"/>
  <text x="316" y="229" text-anchor="middle" font-size="10" fill="#475569">관찰 1</text>
  <rect x="360" y="212" width="76" height="26" rx="4" fill="#F1F5F9" stroke="#CBD5E1"/>
  <text x="398" y="229" text-anchor="middle" font-size="10" fill="#475569">관찰 2</text>
  <rect x="442" y="212" width="76" height="26" rx="4" fill="#F1F5F9" stroke="#CBD5E1"/>
  <text x="480" y="229" text-anchor="middle" font-size="10" fill="#475569">관찰 3</text>
  <text x="536" y="229" font-size="11" fill="#94A3B8">···</text>
  <rect x="558" y="212" width="76" height="26" rx="4" fill="#F1F5F9" stroke="#CBD5E1"/>
  <text x="596" y="229" text-anchor="middle" font-size="10" fill="#475569">관찰 N</text>
  <text x="658" y="196" text-anchor="end" font-size="9.5" fill="#94A3B8">스텝마다 적재</text>

  <!-- 추론 · 환경 -->
  <rect x="150" y="340" width="200" height="72" rx="8" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="250" y="368" text-anchor="middle" font-size="14" font-weight="700" fill="#0F172A">추론 (LLM)</text>
  <text x="250" y="388" text-anchor="middle" font-size="9.5" fill="#64748B">클라우드 호출 · 무상태</text>
  <rect x="470" y="340" width="200" height="72" rx="8" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="570" y="368" text-anchor="middle" font-size="14" font-weight="700" fill="#0F172A">환경 (웹 페이지)</text>
  <text x="570" y="388" text-anchor="middle" font-size="9.5" fill="#64748B">브라우저 조작 대상</text>

  <!-- 화살표 -->
  <path d="M 210 261 V 334" fill="none" stroke="#64748B" stroke-width="2" marker-end="url(#arr)"/>
  <text x="222" y="292" font-size="10.5" font-weight="700" fill="#475569">① 전체 컨텍스트 입력</text>
  <text x="222" y="306" font-size="9" fill="#94A3B8">매 스텝 반복</text>
  <path d="M 350 376 H 464" fill="none" stroke="#64748B" stroke-width="2" marker-end="url(#arr)"/>
  <text x="407" y="369" text-anchor="middle" font-size="10.5" font-weight="700" fill="#475569">② 행동</text>
  <path d="M 610 334 V 261" fill="none" stroke="#64748B" stroke-width="2" marker-end="url(#arr)"/>
  <text x="622" y="292" font-size="10.5" font-weight="700" fill="#475569">③ 관찰 적재</text>
  <text x="622" y="306" font-size="9" fill="#94A3B8">DOM/AX 스냅샷</text>

  <text x="150" y="440" font-size="11" fill="#475569">LLM 무상태 — 호출 간 기억 부재 · <tspan font-weight="700">컨텍스트가 루프의 유일한 상태</tspan> · 목표 달성까지 ①~③ 반복</text>

  <!-- 설계 변수 카드 -->
  <text x="820" y="167" font-size="11" font-weight="700" fill="#64748B">루프의 두 내부 요소 = 본 결정의 설계 대상</text>
  <rect x="820" y="175" width="724" height="122" rx="8" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="838" y="198" font-size="13" font-weight="700" fill="#0F172A">컨텍스트 — 루프의 유일한 상태</text>
  <text x="838" y="220" font-size="10.5" fill="#475569">· 무상태 LLM의 입력 전체 = 루프의 기억</text>
  <text x="838" y="238" font-size="10.5" fill="#475569">· 스텝당 수천~수만 토큰의 관찰(DOM/AX) 적재</text>
  <text x="838" y="256" font-size="10.5" fill="#475569">· 스텝 수 증가에 따라 관찰 비중 지속 확대</text>
  <rect x="838" y="266" width="424" height="22" rx="4" fill="#FEF3C7" stroke="#F59E0B"/>
  <text x="848" y="281" font-size="10.5" font-weight="700" fill="#92400E">설계 변수 ① 컨텍스트의 수명 — 보존·폐기 정책</text>

  <rect x="820" y="311" width="724" height="122" rx="8" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="838" y="334" font-size="13" font-weight="700" fill="#0F172A">계획 — 목표와 행동의 정렬 구조</text>
  <text x="838" y="356" font-size="10.5" fill="#475569">· 매 스텝의 국소 결정을 전역 목표에 정렬 (→ 02)</text>
  <text x="838" y="374" font-size="10.5" fill="#475569">· 컨텍스트 내 텍스트로 존재 → 수정 주체 지정이 설계 사항</text>
  <text x="838" y="392" font-size="10.5" fill="#475569">· 집행 강도 = 수정 권한의 위치에 종속</text>
  <rect x="838" y="402" width="424" height="22" rx="4" fill="#FEF3C7" stroke="#F59E0B"/>
  <text x="848" y="417" font-size="10.5" font-weight="700" fill="#92400E">설계 변수 ② 계획의 소유권 — 수정 권한의 위치</text>

  <!-- ===== 02 계획의 역할 ===== -->
  <rect x="40" y="474" width="1520" height="238" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="56" y="488" width="27" height="27" rx="6" fill="#0F172A"/>
  <text x="69.5" y="507" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">02</text>
  <text x="92" y="507" font-size="16.5" font-weight="700" fill="#0F172A">계획의 역할 <tspan font-size="12.5" font-weight="400" fill="#64748B">— 국소 결정과 전역 목표의 연결</tspan></text>

  <rect x="330" y="536" width="270" height="58" rx="10" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="465" y="559" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0F172A">국소 결정 (매 스텝)</text>
  <text x="465" y="580" text-anchor="middle" font-size="10.5" fill="#64748B">현재 화면 기준 다음 행동 선택</text>
  <rect x="1000" y="536" width="270" height="58" rx="10" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="1135" y="559" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0F172A">전역 목표 (태스크)</text>
  <text x="1135" y="580" text-anchor="middle" font-size="10.5" fill="#64748B">"최저가로 주문해줘"</text>
  <line x1="600" y1="565" x2="742" y2="565" stroke="#F59E0B" stroke-width="2.5"/>
  <line x1="858" y1="565" x2="1000" y2="565" stroke="#F59E0B" stroke-width="2.5"/>
  <rect x="746" y="543" width="108" height="44" rx="22" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2.5"/>
  <text x="800" y="571" text-anchor="middle" font-size="15" font-weight="700" fill="#92400E">계획</text>

  <rect x="56" y="620" width="484" height="76" rx="8" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="74" y="643" font-size="12.5" font-weight="700" fill="#0F172A">① 목표 보존</text>
  <text x="74" y="663" font-size="10.5" fill="#475569">조건("최저가")을 명시적 단계로 고정</text>
  <text x="74" y="681" font-size="10.5" fill="#64748B">→ 관찰 적재에 따른 희석 방지</text>

  <rect x="558" y="620" width="484" height="76" rx="8" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="576" y="643" font-size="12.5" font-weight="700" fill="#0F172A">② 진행 추적</text>
  <text x="576" y="663" font-size="10.5" fill="#475569">수행·잔여 단계 관리</text>
  <text x="576" y="681" font-size="10.5" fill="#64748B">→ 단계 완료 판정의 근거</text>

  <rect x="1060" y="620" width="484" height="76" rx="8" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="1078" y="643" font-size="12.5" font-weight="700" fill="#0F172A">③ 행동 정합성 기준선</text>
  <text x="1078" y="663" font-size="10.5" fill="#475569">행동-목적 부합 판별의 기준</text>
  <text x="1078" y="681" font-size="10.5" fill="#64748B">→ DP-C6 행동 시점 판별의 전제</text>

  <!-- ===== 예고 스트립 ===== -->
  <rect x="40" y="740" width="1520" height="46" rx="10" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="800" y="769" text-anchor="middle" font-size="14" font-weight="700" fill="#92400E">두 설계 변수가 성공률을 가르는 지점 — 다단계 웹 태스크의 실패 요인 분석 (2/2)</text>

  <text x="40" y="866" font-size="9.5" fill="#94A3B8">Tizen TV AI Web Agent — ADS · DP-C8 배경장 (1/2)</text>
  <text x="1560" y="866" text-anchor="end" font-size="9.5" fill="#94A3B8">2026-07</text>
</svg>
