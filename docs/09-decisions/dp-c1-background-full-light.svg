<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" font-family="Pretendard, 'Noto Sans KR', 'Malgun Gothic', sans-serif">
  <defs>
    <linearGradient id="spectrum" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#14B8A6"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <marker id="aT" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#0D9488"/>
    </marker>
    <marker id="aTs" markerWidth="10" markerHeight="10" refX="2" refY="5" orient="auto">
      <path d="M10,0 L0,5 L10,10 Z" fill="#0D9488"/>
    </marker>
    <marker id="aP" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#7C3AED"/>
    </marker>
    <marker id="aM" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748B"/>
    </marker>
  </defs>

  <rect width="1920" height="1080" fill="#FFFFFF"/>

  <!-- ===== header ===== -->
  <text x="70" y="40" font-size="13" fill="#0D9488" letter-spacing="3">DECISION POINT C1 · ARGOT 통합 인터페이스</text>
  <text x="70" y="80" font-size="32" font-weight="700" fill="#111827">DP-C1 배경 — argot 통합 인터페이스</text>
  <text x="70" y="110" font-size="14.5" fill="#5B6472">웹 에이전트를 argot에 통합하는 계약(contract)은 시스템의 유일한 진입점을 규정하며, 통합 결합도(Integration Coupling)를 어디에 두든 핵심 QA들이 정반대로 갈리는 되돌리기 어려운 구조적 결정이다</text>

  <!-- ============================================================ -->
  <!-- 01 문제 정의 : contract diagram (left, top zone)             -->
  <!-- ============================================================ -->
  <text x="70" y="160" font-size="17" font-weight="700" fill="#0D9488">01 · 문제 정의<tspan fill="#111827"> — 웹 에이전트는 argot에 어떤 계약으로 통합되는가</tspan></text>

  <!-- user -->
  <rect x="70" y="290" width="130" height="90" rx="12" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="135" y="329" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">사용자</text>
  <text x="135" y="353" font-size="10.5" fill="#5B6472" text-anchor="middle">음성 · 리모컨</text>
  <path d="M200,335 L232,335" stroke="#64748B" stroke-width="2" marker-end="url(#aM)"/>
  <text x="216" y="322" font-size="10.5" fill="#5B6472" text-anchor="middle">발화</text>

  <!-- argot -->
  <rect x="240" y="210" width="200" height="250" rx="14" fill="#F0FDFA" stroke="#0D9488" stroke-width="1.5"/>
  <text x="340" y="245" font-size="17" font-weight="700" fill="#0F766E" text-anchor="middle">argot</text>
  <text x="340" y="266" font-size="11" fill="#5B6472" text-anchor="middle">Platform Main Agent</text>
  <rect x="255" y="288" width="170" height="32" rx="8" fill="#CCFBF1" stroke="#5EEAD4"/>
  <text x="340" y="309" font-size="11.5" fill="#334155" text-anchor="middle">의도 해석 · 라우팅</text>
  <rect x="255" y="330" width="170" height="32" rx="8" fill="#CCFBF1" stroke="#5EEAD4"/>
  <text x="340" y="351" font-size="11.5" fill="#334155" text-anchor="middle">대화 · 세션 관리</text>
  <rect x="255" y="372" width="170" height="32" rx="8" fill="#CCFBF1" stroke="#5EEAD4"/>
  <text x="340" y="393" font-size="11.5" fill="#334155" text-anchor="middle">타 스킬 · 에이전트 총괄</text>
  <text x="340" y="440" font-size="10" fill="#94A3B8" text-anchor="middle">외부 시스템 (본 과제 범위 밖)</text>

  <!-- contract zone -->
  <rect x="475" y="185" width="220" height="290" rx="14" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="7 5"/>
  <text x="585" y="215" font-size="14" font-weight="700" fill="#B45309" text-anchor="middle">통합 계약 (Contract)</text>
  <text x="585" y="234" font-size="10.5" fill="#B45309" text-anchor="middle">어떤 형태인가? = DP-C1</text>

  <!-- channels -->
  <text x="585" y="262" font-size="11.5" font-weight="700" fill="#334155" text-anchor="middle">① 태스크 라우팅 · 위임</text>
  <path d="M455,272 L715,272" stroke="#0D9488" stroke-width="2.2" marker-end="url(#aT)"/>

  <text x="585" y="307" font-size="11.5" font-weight="700" fill="#334155" text-anchor="middle">② 진행 보고 · 결과 반환</text>
  <path d="M715,317 L460,317" stroke="#7C3AED" stroke-width="2.2" marker-end="url(#aP)"/>

  <text x="585" y="352" font-size="11.5" font-weight="700" fill="#334155" text-anchor="middle">③ 인터럽트 · 중단/재개</text>
  <path d="M455,362 L715,362" stroke="#0D9488" stroke-width="2.2" marker-end="url(#aT)"/>

  <text x="585" y="397" font-size="11.5" font-weight="700" fill="#334155" text-anchor="middle">④ 컨텍스트 공유 (범위 = ?)</text>
  <path d="M462,407 L710,407" stroke="#64748B" stroke-width="2.2" marker-start="url(#aTs)" marker-end="url(#aM)"/>

  <text x="585" y="442" font-size="11.5" font-weight="700" fill="#334155" text-anchor="middle">⑤ 프로세스 · 배포 경계</text>
  <line x1="460" y1="452" x2="710" y2="452" stroke="#64748B" stroke-width="1.8" stroke-dasharray="4 5"/>

  <!-- web agent -->
  <rect x="730" y="210" width="280" height="250" rx="14" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="870" y="243" font-size="15" font-weight="700" fill="#6D28D9" text-anchor="middle">웹 에이전트 (본 시스템)</text>
  <text x="870" y="263" font-size="10.5" fill="#5B6472" text-anchor="middle">자체 에이전트 루프 · 다단계 웹 태스크 자율 수행</text>

  <rect x="832" y="284" width="76" height="26" rx="13" fill="#EDE9FE" stroke="#C4B5FD"/>
  <text x="870" y="301" font-size="10.5" fill="#5B21B6" text-anchor="middle">계획</text>
  <rect x="912" y="347" width="76" height="26" rx="13" fill="#EDE9FE" stroke="#C4B5FD"/>
  <text x="950" y="364" font-size="10.5" fill="#5B21B6" text-anchor="middle">도구 호출</text>
  <rect x="832" y="410" width="76" height="26" rx="13" fill="#EDE9FE" stroke="#C4B5FD"/>
  <text x="870" y="427" font-size="10.5" fill="#5B21B6" text-anchor="middle">관찰</text>
  <rect x="752" y="347" width="76" height="26" rx="13" fill="#EDE9FE" stroke="#C4B5FD"/>
  <text x="790" y="364" font-size="10.5" fill="#5B21B6" text-anchor="middle">복구·재시도</text>

  <path d="M912,300 Q950,312 950,343" fill="none" stroke="#8B5CF6" stroke-width="1.8" marker-end="url(#aP)"/>
  <path d="M950,377 Q950,412 912,422" fill="none" stroke="#8B5CF6" stroke-width="1.8" marker-end="url(#aP)"/>
  <path d="M828,422 Q790,412 790,377" fill="none" stroke="#8B5CF6" stroke-width="1.8" marker-end="url(#aP)"/>
  <path d="M790,343 Q790,312 828,300" fill="none" stroke="#8B5CF6" stroke-width="1.8" marker-end="url(#aP)"/>

  <!-- browser -->
  <path d="M1010,335 L1048,335" stroke="#64748B" stroke-width="2" marker-end="url(#aM)"/>
  <text x="1029" y="322" font-size="10.5" fill="#5B6472" text-anchor="middle">관찰·조작</text>
  <rect x="1055" y="290" width="145" height="90" rx="12" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="1127" y="327" font-size="13.5" font-weight="700" fill="#111827" text-anchor="middle">브라우저 · 웹</text>
  <text x="1127" y="351" font-size="10.5" fill="#5B6472" text-anchor="middle">신뢰 불가 외부 콘텐츠</text>

  <!-- diagram caption -->
  <text x="635" y="500" font-size="12.5" text-anchor="middle"><tspan fill="#5B6472">결정 대상은 박스가 아니라 경계 — </tspan><tspan fill="#B45309" font-weight="700">무엇이 · 어떤 채널로 · 누구의 소유로</tspan><tspan fill="#5B6472"> 오가는가를 계약이 규정한다</tspan></text>

  <!-- ============================================================ -->
  <!-- 02 왜 중요한가 (right column)                                 -->
  <!-- ============================================================ -->
  <text x="1260" y="160" font-size="17" font-weight="700" fill="#0D9488">02 · 왜 중요한가</text>

  <rect x="1260" y="180" width="590" height="74" rx="11" fill="#F8FAFC" stroke="#E2E8F0"/>
  <circle cx="1292" cy="212" r="12" fill="#F1F5F9" stroke="#0D9488"/>
  <text x="1292" y="217" font-size="11" font-weight="700" fill="#0D9488" text-anchor="middle">1</text>
  <text x="1314" y="217" font-size="14.5" font-weight="700" fill="#111827">유일한 진입점 → 상한을 결정</text>
  <text x="1288" y="241" font-size="11.5" fill="#5B6472">모든 발화는 argot 경유 — 라우팅 유실 시 내부 품질은 전달될 기회조차 없음</text>

  <rect x="1260" y="263" width="590" height="74" rx="11" fill="#F8FAFC" stroke="#E2E8F0"/>
  <circle cx="1292" cy="295" r="12" fill="#F1F5F9" stroke="#0D9488"/>
  <text x="1292" y="300" font-size="11" font-weight="700" fill="#0D9488" text-anchor="middle">2</text>
  <text x="1314" y="300" font-size="14.5" font-weight="700" fill="#111827">다수 QA를 상반된 방향으로 관통</text>
  <text x="1288" y="324" font-size="11.5" fill="#5B6472">라우팅 · 결합도 · 배포 독립성 · 격리 · 인터럽트 · 컨텍스트 · 응답성에 동시 영향</text>

  <rect x="1260" y="346" width="590" height="74" rx="11" fill="#F8FAFC" stroke="#E2E8F0"/>
  <circle cx="1292" cy="378" r="12" fill="#F1F5F9" stroke="#0D9488"/>
  <text x="1292" y="383" font-size="11" font-weight="700" fill="#0D9488" text-anchor="middle">3</text>
  <text x="1314" y="383" font-size="14.5" font-weight="700" fill="#111827">결정 그래프의 루트</text>
  <text x="1288" y="407" font-size="11.5" fill="#5B6472">Quick Action 구조 · 상주/격리 모델 · 배포 파이프라인이 이 계약을 전제로 성립</text>

  <rect x="1260" y="429" width="590" height="74" rx="11" fill="#F8FAFC" stroke="#E2E8F0"/>
  <circle cx="1292" cy="461" r="12" fill="#F1F5F9" stroke="#0D9488"/>
  <text x="1292" y="466" font-size="11" font-weight="700" fill="#0D9488" text-anchor="middle">4</text>
  <text x="1314" y="466" font-size="14.5" font-weight="700" fill="#111827">되돌리기 어려움</text>
  <text x="1288" y="490" font-size="11.5" fill="#5B6472">argot과의 합의 — 변경엔 협의 + 양측 동시 배포, 교정 비용 비선형 증가</text>

  <!-- ============================================================ -->
  <!-- 03 왜 어려운가 (bottom zone, compact)                         -->
  <!-- ============================================================ -->
  <text x="70" y="556" font-size="17" font-weight="700"><tspan fill="#0D9488">03 · 왜 어려운가</tspan><tspan fill="#111827"> — 통합 결합도를 두고 QA가 정면 충돌한다</tspan></text>

  <!-- left: spectrum + compact tension table -->
  <text x="70" y="594" font-size="13.5" font-weight="700" fill="#0D9488">느슨한 결합<tspan font-size="10.5" font-weight="400" fill="#5B6472">  최소 계약 표면 · 강한 경계</tspan></text>
  <text x="1180" y="594" font-size="13.5" font-weight="700" fill="#7C3AED" text-anchor="end"><tspan font-size="10.5" font-weight="400" fill="#5B6472">확장 계약 표면 · 긴밀한 채널  </tspan>긴밀한 결합</text>
  <rect x="70" y="604" width="1110" height="6" rx="3" fill="url(#spectrum)"/>
  <text x="625" y="626" font-size="10.5" fill="#94A3B8" text-anchor="middle">단일 결정 변수 : 통합 결합도 (Integration Coupling)</text>

  <!-- row 1 -->
  <rect x="70" y="640" width="175" height="56" rx="11" fill="#F1F5F9" stroke="#CBD5E1"/>
  <text x="157" y="673" font-size="12.5" font-weight="700" fill="#111827" text-anchor="middle">① 계약 표면의 크기</text>
  <rect x="260" y="640" width="440" height="56" rx="10" fill="#F0FDFA" stroke="#0D9488" stroke-opacity="0.65"/>
  <text x="280" y="663" font-size="13.5" font-weight="700" fill="#0F766E">배포 독립성 · 낮은 결합도</text>
  <text x="280" y="683" font-size="10.5" fill="#5B6472">명세 최소화 → argot 배포 주기에서 분리</text>
  <polygon points="702,668 712,662 712,674" fill="#0D9488"/>
  <polygon points="738,668 728,662 728,674" fill="#7C3AED"/>
  <rect x="740" y="640" width="440" height="56" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-opacity="0.65"/>
  <text x="760" y="663" font-size="13.5" font-weight="700" fill="#6D28D9">라우팅 정확도</text>
  <text x="760" y="683" font-size="10.5" fill="#5B6472">풍부한 명세가 argot 쪽에 상주해야 유실·오분류 감소</text>

  <!-- row 2 -->
  <rect x="70" y="706" width="175" height="56" rx="11" fill="#F1F5F9" stroke="#CBD5E1"/>
  <text x="157" y="739" font-size="12.5" font-weight="700" fill="#111827" text-anchor="middle">② 경계의 강도</text>
  <rect x="260" y="706" width="440" height="56" rx="10" fill="#F0FDFA" stroke="#0D9488" stroke-opacity="0.65"/>
  <text x="280" y="729" font-size="13.5" font-weight="700" fill="#0F766E">오류 격리</text>
  <text x="280" y="749" font-size="10.5" fill="#5B6472">실패가 argot·Bixby 경험을 오염시키지 않도록 차단</text>
  <polygon points="702,734 712,728 712,740" fill="#0D9488"/>
  <polygon points="738,734 728,728 728,740" fill="#7C3AED"/>
  <rect x="740" y="706" width="440" height="56" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-opacity="0.65"/>
  <text x="760" y="729" font-size="13.5" font-weight="700" fill="#6D28D9">제어권 이양 · 인터럽트 전파</text>
  <text x="760" y="749" font-size="10.5" fill="#5B6472">장시간 태스크의 협조적 제어엔 촘촘한 양방향 채널 필요</text>

  <!-- row 3 -->
  <rect x="70" y="772" width="175" height="56" rx="11" fill="#F1F5F9" stroke="#CBD5E1"/>
  <text x="157" y="805" font-size="12.5" font-weight="700" fill="#111827" text-anchor="middle">③ 컨텍스트 공유</text>
  <rect x="260" y="772" width="440" height="56" rx="10" fill="#F0FDFA" stroke="#0D9488" stroke-opacity="0.65"/>
  <text x="280" y="795" font-size="13.5" font-weight="700" fill="#0F766E">토큰 비용 · 오염 방지</text>
  <text x="280" y="815" font-size="10.5" fill="#5B6472">DOM·페이지 상태의 Main Agent 역류 차단</text>
  <polygon points="702,800 712,794 712,806" fill="#0D9488"/>
  <polygon points="738,800 728,794 728,806" fill="#7C3AED"/>
  <rect x="740" y="772" width="440" height="56" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-opacity="0.65"/>
  <text x="760" y="795" font-size="13.5" font-weight="700" fill="#6D28D9">의도 해석 · 연속 대화 품질</text>
  <text x="760" y="815" font-size="10.5" fill="#5B6472">argot의 대화 컨텍스트를 넓게 공유할수록 유리</text>

  <!-- row 4 -->
  <rect x="70" y="838" width="175" height="56" rx="11" fill="#F1F5F9" stroke="#CBD5E1"/>
  <text x="157" y="871" font-size="12.5" font-weight="700" fill="#111827" text-anchor="middle">④ 프로세스·배포 단위</text>
  <rect x="260" y="838" width="440" height="56" rx="10" fill="#F0FDFA" stroke="#0D9488" stroke-opacity="0.65"/>
  <text x="280" y="861" font-size="13.5" font-weight="700" fill="#0F766E">메모리 예산 · 격리 보증</text>
  <text x="280" y="881" font-size="10.5" fill="#5B6472">상시 상주 회피 + 프로세스 경계 유지 (TV 자원 제약)</text>
  <polygon points="702,866 712,860 712,872" fill="#0D9488"/>
  <polygon points="738,866 728,860 728,872" fill="#7C3AED"/>
  <rect x="740" y="838" width="440" height="56" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-opacity="0.65"/>
  <text x="760" y="861" font-size="13.5" font-weight="700" fill="#6D28D9">응답성 (진입 오버헤드 ↓)</text>
  <text x="760" y="881" font-size="10.5" fill="#5B6472">기동·IPC 비용 제거 — Quick Action 즉답 경로와 직결</text>

  <!-- right: web task domain profile -->
  <rect x="1220" y="585" width="630" height="320" rx="14" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="1248" y="618" font-size="16" font-weight="700" fill="#111827">웹 태스크의 도메인 특성 — 계약이 감당해야 할 실행 프로파일</text>
  <text x="1248" y="640" font-size="11" fill="#5B6472">예) “쇼핑몰에서 생수 최저가로 주문해줘” — 단일 요청-응답으로 담을 수 없는 실행 형태</text>
  <text x="1481" y="666" font-size="10" font-weight="700" fill="#B45309" text-anchor="middle">실패 · 재시도</text>
  <line x1="1481" y1="672" x2="1481" y2="698" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="1589" y="666" font-size="10" font-weight="700" fill="#7C3AED" text-anchor="middle">사용자 인터럽트</text>
  <line x1="1589" y1="672" x2="1589" y2="698" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="1720" y="666" font-size="10" font-weight="700" fill="#B45309" text-anchor="middle">비가역 행동 · HITL 확인</text>
  <line x1="1697" y1="672" x2="1697" y2="698" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="3 3"/>
  <line x1="1265" y1="706" x2="1805" y2="706" stroke="#94A3B8" stroke-width="2"/>
  <circle cx="1265" cy="706" r="7" fill="#F0FDFA" stroke="#0D9488" stroke-width="2"/>
  <text x="1265" y="728" font-size="9.5" fill="#334155" text-anchor="middle">계획</text>
  <circle cx="1373" cy="706" r="7" fill="#F0FDFA" stroke="#0D9488" stroke-width="2"/>
  <text x="1373" y="728" font-size="9.5" fill="#334155" text-anchor="middle">검색</text>
  <circle cx="1481" cy="706" r="7" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2"/>
  <text x="1481" y="728" font-size="9.5" fill="#334155" text-anchor="middle">필터·비교</text>
  <circle cx="1589" cy="706" r="7" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2"/>
  <text x="1589" y="728" font-size="9.5" fill="#334155" text-anchor="middle">장바구니</text>
  <circle cx="1697" cy="706" r="7" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2"/>
