  <text x="1535" y="752" font-size="10" fill="#5B6472" text-anchor="middle">장시간 실행 : 수십 초 ~ 수 분</text>
  <rect x="1248" y="776" width="183" height="76" rx="9" fill="#F1F5F9" stroke="#CBD5E1"/>
  <text x="1262" y="797" font-size="12" font-weight="700" fill="#111827">다단계 · 장시간</text>
  <text x="1262" y="814" font-size="9.5" fill="#5B6472">결과 한 번이 아니라</text>
  <text x="1262" y="828" font-size="9.5" fill="#5B6472">중간 상태를 흘려보내야 함</text>
  <text x="1262" y="845" font-size="10" font-weight="700" fill="#0D9488">→ 진행 보고 채널</text>
  <rect x="1443" y="776" width="183" height="76" rx="9" fill="#F1F5F9" stroke="#CBD5E1"/>
  <text x="1457" y="797" font-size="12" font-weight="700" fill="#111827">실행 중 개입</text>
  <text x="1457" y="814" font-size="9.5" fill="#5B6472">발화·리모컨 입력이</text>
  <text x="1457" y="828" font-size="9.5" fill="#5B6472">in-flight 행동에 닿아야 함</text>
  <text x="1457" y="845" font-size="10" font-weight="700" fill="#0D9488">→ 인터럽트 · 중단/재개</text>
  <rect x="1638" y="776" width="183" height="76" rx="9" fill="#F1F5F9" stroke="#CBD5E1"/>
  <text x="1652" y="797" font-size="12" font-weight="700" fill="#111827">부분 실패 상시</text>
  <text x="1652" y="814" font-size="9.5" fill="#5B6472">사이트 변경·오류가 잦음.</text>
  <text x="1652" y="828" font-size="9.5" fill="#5B6472">실패가 호스트로 번지면 안 됨</text>
  <text x="1652" y="845" font-size="10" font-weight="700" fill="#0D9488">→ 오류 격리 경계</text>
  <text x="1248" y="878" font-size="12" font-weight="700" fill="#111827">→ 계약은 ‘결과 반환’이 아니라 <tspan fill="#B45309">실행 중의 상태 · 제어</tspan>를 감당해야 한다</text>
  <text x="1248" y="896" font-size="10.5" fill="#5B6472">그런데 그 채널을 두껍게 열수록 오류 격리·배포 독립성이 무너진다 — 좌측 긴장 ②·④의 근원</text>

